services:
 - type: web
   name: anvx-api
   runtime: python
   buildCommand: pip install uv && uv sync
   startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
   envVars:
     - key: SUPABASE_URL
     - sync: false
     - key: SUPABASE_SERVICE_ROLE_KEY
     - sync: false
     - key: CRON_SECRET
     - sync: false
     - key: CLERK_SECRET_KEY
     - sync: false
