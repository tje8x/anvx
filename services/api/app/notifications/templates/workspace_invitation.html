<h2 style="color:#1a5276;margin:0 0 8px">You're invited to {{ workspace_name }}</h2>
<p>{{ inviter_name | default('A teammate') }} has invited you to join <strong>{{ workspace_name }}</strong> as <strong>{{ role_label | default('a team member') }}</strong>.</p>
<p><a href="https://anvx.io/invite/{{ invitation_id }}">Accept invitation →</a></p>
<p style="color:#888;font-size:12px;margin-top:16px">This invitation expires in 7 days.</p>
